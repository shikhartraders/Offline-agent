<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shikhar Traders AI</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
}
.chat-container {
    max-width: 520px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
.header {
    padding: 15px;
    background: linear-gradient(45deg,#2563eb,#9333ea);
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}
.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}
.message {
    margin: 10px;
    padding: 14px;
    border-radius: 14px;
    max-width: 85%;
    white-space: pre-line;
    line-height: 1.4;
}
.user {
    background: #2563eb;
    margin-left: auto;
}
.bot {
    background: #1e293b;
}
.input-area {
    display: flex;
    padding: 10px;
}
input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
}
button {
    margin-left: 5px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #9333ea;
    color: white;
}
.whatsapp-btn {
    background: #25D366;
    margin: 10px;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">Shikhar Traders AI 🤖</div>

    <div class="chat-box" id="chat"></div>

    <div class="whatsapp-btn" onclick="sendToWhatsApp()">
        📲 Order on WhatsApp
    </div>

    <div class="input-area">
        <input id="input" placeholder="Type or speak...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoice()">🎤</button>
    </div>
</div>

<script>

// =====================
// 📦 BUSINESS DATABASE
// =====================

const store = {
    name: "Shikhar Trader’s",
    location: "Ahiraula Bypass Road, Azamgarh",
    phone: ["07355969446","09450805567"],
    website: "https://shikhartradersbs.odoo.com/",
    timing: "10 AM – 7 PM"
};

const products = {
    cement: {
        name: "UltraTech Cement",
        variants: [
            {name: "Paper Bag", price: 415},
            {name: "Weather Plus", price: 420},
            {name: "Super Cement", price: 415}
        ],
        min: 30
    },
    waterproof: {
        name: "UltraTech Weather Pro",
        variants: [
            {size: "1L", price: 175},
            {size: "5L", price: 750},
            {size: "10L", price: 1450},
            {size: "20L", price: 2550}
        ]
    },
    rings: {
        price: 12,
        min: 1000
    },
    cover: {
        price: 300,
        perBag: 300
    }
};

// =====================
// 🧠 STATE MANAGEMENT
// =====================

let order = {
    product: "",
    quantity: "",
    size: ""
};

// =====================
// 🧠 LANGUAGE DETECTION
// =====================

function isHindi(msg){
    return /kya|hai|chahiye|kitna|price|batao|hai\?/i.test(msg);
}

// =====================
// 🧠 RESPONSE BUILDER
// =====================

function buildCementReply(hindi){
    return hindi
    ? `Bilkul! Cement available hai ✅

• UltraTech Paper: ₹415
• Weather Plus: ₹420
• Super Cement: ₹415
• Delivery: Minimum 30 bags

Prices approx hain ✅ WhatsApp par exact price milega.

Aapko kitne bags chahiye?`
    : `Cement available ✅

• Paper: ₹415
• Weather Plus: ₹420
• Super: ₹415
• Minimum delivery: 30 bags

Prices are approx.

How many bags do you need?`;
}

function buildWaterReply(hindi){
    return hindi
    ? `Waterproofing available hai ✅

• 1L: ₹175
• 5L: ₹750
• 10L: ₹1450
• 20L: ₹2550

Stock website par depend karta hai.

Kaunsa size chahiye?`
    : `Waterproofing available ✅

• 1L: ₹175
• 5L: ₹750
• 10L: ₹1450
• 20L: ₹2550

Stock depends on website.

Which size do you need?`;
}

// =====================
// 💬 MAIN AI ENGINE
// =====================

function getReply(msg){

    let m = msg.toLowerCase();
    let hindi = isHindi(msg);

    // ❌ Brand restriction
    if(m.includes("acc") || m.includes("ambuja") || m.includes("other")){
        return hindi
        ? "Hum sirf UltraTech products hi sell karte hain ✅"
        : "We sell only UltraTech products ✅";
    }

    // 🧱 Cement
    if(m.includes("cement")){
        order.product = "Cement";
        return buildCementReply(hindi);
    }

    // 💧 Waterproof
    if(m.includes("water") || m.includes("proof")){
        order.product = "Waterproofing";
        return buildWaterReply(hindi);
    }

    // ⭕ Rings
    if(m.includes("ring")){
        order.product = "Rings";
        return hindi
        ? `Rings available hain ✅

• ₹12 per piece
• Minimum 1000 pieces

Kitni quantity chahiye?`
        : `Rings available ✅

• ₹12 per piece
• Minimum 1000 pcs

How many pieces do you need?`;
    }

    // 🧱 Cover Blocks
    if(m.includes("cover")){
        order.product = "Cover Blocks";
        return hindi
        ? `Cover blocks available hain ✅

• ₹300 per bag
• 1 bag = 300 pieces

Kitne bags chahiye?`
        : `Cover blocks available ✅

• ₹300 per bag
• 1 bag = 300 pcs

How many bags do you need?`;
    }

    // 📦 Quantity detect
    let qty = m.match(/\d+/);
    if(qty){
        order.quantity = qty[0];
        return hindi
        ? `Perfect ✅

Aap WhatsApp par order place kar sakte hain 👇`
        : `Perfect ✅

Proceed to WhatsApp order 👇`;
    }

    // 🚚 Delivery
    if(m.includes("delivery")){
        return hindi
        ? `Haan delivery available hai ✅

• Cement delivery: minimum 30 bags`
        : `Delivery available ✅

• Cement: minimum 30 bags`;
    }

    // 💰 Price
    if(m.includes("price")){
        return hindi
        ? `Prices approx hain ✅

Exact price ke liye WhatsApp karein.`
        : `Prices are approx.

Check WhatsApp for exact rate.`;
    }

    // 👋 Default
    return hindi
    ? `Namaste 🙏 Welcome to Shikhar Trader’s!

Main aapki help karunga ✅

Aapko kya chahiye?
• Cement
• Waterproofing
• Rings
• Cover Blocks`
    : `Welcome 👋

How can I help you?

• Cement
• Waterproofing
• Rings
• Cover Blocks`;
}

// =====================
// 📲 WHATSAPP SYSTEM
// =====================

function sendToWhatsApp(){

    let message = `Hi Shikhar Trader’s,
Product: ${order.product}
Quantity: ${order.quantity}
Location: `;

    let url = "https://wa.me/917355969446?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}

// =====================
// 💬 CHAT SYSTEM
// =====================

function sendMessage(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    let reply = getReply(text);
    addMessage(reply,"bot");
    speak(reply);
}

// =====================
// 🧾 UI
// =====================

function addMessage(text,type){
    let chat=document.getElementById("chat");
    let div=document.createElement("div");
    div.className="message "+type;
    div.innerText=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

// =====================
// 🎤 VOICE INPUT
// =====================

function startVoice(){
    let r=new webkitSpeechRecognition();
    r.lang="en-IN";
    r.start();

    r.onresult=e=>{
        document.getElementById("input").value =
        e.results[0][0].transcript;
        sendMessage();
    }
}

// =====================
// 🔊 VOICE OUTPUT
// =====================

function speak(text){
    let s=new SpeechSynthesisUtterance(text);
    s.lang="hi-IN";
    speechSynthesis.speak(s);
}

</script>

</body>
</html>
