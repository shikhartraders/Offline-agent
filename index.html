<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shikhar Traders AI</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
}
.chat-container {
    max-width: 500px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
.header {
    padding: 15px;
    background: linear-gradient(45deg,#2563eb,#9333ea);
    text-align: center;
    font-weight: bold;
}
.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}
.message {
    margin: 10px;
    padding: 12px;
    border-radius: 12px;
    max-width: 80%;
    white-space: pre-line;
}
.user {
    background: #2563eb;
    margin-left: auto;
}
.bot {
    background: #1e293b;
}
.input-area {
    display: flex;
    padding: 10px;
}
input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
}
button {
    margin-left: 5px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #9333ea;
    color: white;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">Shikhar Traders AI 🤖</div>
    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Type or speak...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoice()">🎤</button>
    </div>
</div>

<script>

// 🧠 LANGUAGE DETECTION
function isHindi(msg){
    return /kya|hai|chahiye|kitna|price|batao|hai\?/i.test(msg);
}

// 💬 MAIN AI LOGIC
function getReply(msg){
    let m = msg.toLowerCase();
    let hindi = isHindi(msg);

    // ❌ Other brands
    if(m.includes("acc") || m.includes("ambuja") || m.includes("other")){
        return hindi
        ? "Nahi, hum sirf UltraTech products hi sell karte hain ✅"
        : "We sell only UltraTech products ✅";
    }

    // 🧱 Cement
    if(m.includes("cement")){
        return hindi
        ? `Bilkul! Cement available hai ✅

• UltraTech Paper: ₹415
• Weather Plus: ₹420
• Super Cement: ₹415
• Delivery: Minimum 30 bags

Prices approx hain ✅ Accurate price ke liye WhatsApp karein.

Aapko kitne bags chahiye?`
        : `Cement is available ✅

• Paper: ₹415
• Weather Plus: ₹420
• Super: ₹415
• Delivery: Minimum 30 bags

Prices are approx. Check WhatsApp for exact price.

How many bags do you need?`;
    }

    // 💧 Waterproofing
    if(m.includes("water") || m.includes("proof")){
        return hindi
        ? `Waterproofing available hai ✅

• 1L: ₹175
• 5L: ₹750
• 10L: ₹1450
• 20L: ₹2550

Stock website par depend karta hai.

Kaunsa pack size chahiye?`
        : `Waterproofing available ✅

• 1L: ₹175
• 5L: ₹750
• 10L: ₹1450
• 20L: ₹2550

Stock depends on website.

Which size do you need?`;
    }

    // ⭕ Rings
    if(m.includes("ring")){
        return hindi
        ? `Rings available hain ✅

• ₹12 per piece
• Minimum 1000 pieces

Kitni quantity chahiye?`
        : `Rings available ✅

• ₹12 per piece
• Minimum 1000 pcs

How many pieces do you need?`;
    }

    // 🧱 Cover Blocks
    if(m.includes("cover")){
        return hindi
        ? `Cover blocks available hain ✅

• ₹300 per bag (300 pcs)

Kitne bags chahiye?`
        : `Cover blocks available ✅

• ₹300 per bag (300 pcs)

How many bags do you need?`;
    }

    // 🚚 Delivery
    if(m.includes("delivery")){
        return hindi
        ? `Haan delivery available hai ✅

• Cement delivery: minimum 30 bags

Aapka location kya hai?`
        : `Yes delivery is available ✅

• Cement delivery: minimum 30 bags

What is your location?`;
    }

    // 📞 Order
    if(m.includes("order") || m.includes("buy")){
        return hindi
        ? `Order call par accept nahi hota ❌

WhatsApp par message karein:

Hi Shikhar Trader’s,
Mujhe UltraTech ___ chahiye
Quantity: ___
Location: ___

Main aapko help kar dunga ✅`
        : `Orders are not accepted on call ❌

Send this on WhatsApp:

Hi Shikhar Trader’s,
I need UltraTech ___
Quantity: ___
Location: ___`;
    }

    // 💰 Price
    if(m.includes("price")){
        return hindi
        ? `Prices approx hain ✅

Accurate updated price ke liye WhatsApp par "Hi Shikhar Trader’s" bhejein ya website check karein.`
        : `Prices are approximate ✅

For exact price, contact on WhatsApp or check website.`;
    }

    // 👋 Greeting
    return hindi
    ? `Namaste 🙏 Welcome to Shikhar Trader’s!

Main aapki requirement ke hisaab se best UltraTech solution suggest karunga ✅

Aapko kya chahiye?
• Cement
• Waterproofing
• Cover Blocks
• Rings`
    : `Welcome to Shikhar Trader’s 👋

I will help you choose the best UltraTech product ✅

What do you need?
• Cement
• Waterproofing
• Cover Blocks
• Rings`;
}

// 💬 SEND
function sendMessage(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    let reply = getReply(text);
    addMessage(reply,"bot");
    speak(reply);
}

// 🧾 UI
function addMessage(text,type){
    let chat=document.getElementById("chat");
    let div=document.createElement("div");
    div.className="message "+type;
    div.innerText=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

// 🎤 Voice
function startVoice(){
    let r=new webkitSpeechRecognition();
    r.lang="en-IN";
    r.start();
    r.onresult=e=>{
        document.getElementById("input").value=e.results[0][0].transcript;
        sendMessage();
    }
}

// 🔊 Speak
function speak(text){
    let s=new SpeechSynthesisUtterance(text);
    s.lang="hi-IN";
    speechSynthesis.speak(s);
}

</script>

</body>
</html>
